<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroid Blaster - Arcade Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px;
        }

        .container {
            background: #0f3460;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 30px;
            max-width: 600px;
            width: 100%;
            border: 2px solid #e94560;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #e94560;
            font-size: 32px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat-box {
            background: rgba(233, 69, 96, 0.1);
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            border: 1px solid #e94560;
        }

        .stat-box label {
            display: block;
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto 20px;
            background: #000;
            border-radius: 10px;
            border: 2px solid #e94560;
            cursor: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e94560;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }

        button:hover {
            background: #e94560;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            background: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            border-radius: 5px;
            font-size: 13px;
            color: #ccc;
            line-height: 1.6;
        }

        .wave-indicator {
            text-align: center;
            color: #e94560;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Asteroid Blaster</h1>
            <p style="color: #999; font-size: 14px;">Destroy asteroids before they reach you!</p>
        </div>

        <div class="wave-indicator" id="waveIndicator">Wave 1</div>

        <div class="stats">
            <div class="stat-box">
                <label>Score</label>
                <div class="value" id="score">0</div>
            </div>
            <div class="stat-box">
                <label>Health</label>
                <div class="value" id="health">3</div>
            </div>
            <div class="stat-box">
                <label>Wave</label>
                <div class="value" id="wave">1</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="560" height="400"></canvas>

        <div class="controls">
            <button onclick="game.resetGame()">New Game</button>
            <button onclick="game.togglePause()">Pause</button>
        </div>

        <div class="info">
            <strong>How to Play:</strong><br>
            Use the MOUSE to move your ship. CLICK to shoot. Destroy all asteroids before they reach you!
        </div>
    </div>

    <script>
        class AsteroidBlasterGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();

                this.player = {
                    x: this.canvas.width / 2,
                    y: this.canvas.height - 40,
                    width: 30,
                    height: 30,
                    angle: 0,
                    speed: 5
                };

                this.bullets = [];
                this.asteroids = [];
                this.particles = [];
                this.score = 0;
                this.health = 3;
                this.wave = 1;
                this.isPaused = false;
                this.mouseX = this.canvas.width / 2;
                this.mouseY = this.canvas.height / 2;

                this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                this.canvas.addEventListener('click', () => this.shoot());
                this.resetGame();
                this.gameLoop();
            }

            resetGame() {
                this.player.x = this.canvas.width / 2;
                this.player.y = this.canvas.height - 40;
                this.bullets = [];
                this.asteroids = [];
                this.particles = [];
                this.score = 0;
                this.health = 3;
                this.wave = 1;
                this.isPaused = false;
                this.spawnWave();
                this.playSound(400, 0.1, 0.1);
            }

            togglePause() {
                this.isPaused = !this.isPaused;
            }

            handleMouseMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                this.mouseX = e.clientX - rect.left;
                this.mouseY = e.clientY - rect.top;

                const dx = this.mouseX - this.player.x;
                const dy = this.mouseY - this.player.y;
                this.player.angle = Math.atan2(dy, dx);
            }

            shoot() {
                if (this.isPaused || this.health <= 0) return;

                const bullet = {
                    x: this.player.x + Math.cos(this.player.angle) * 15,
                    y: this.player.y + Math.sin(this.player.angle) * 15,
                    vx: Math.cos(this.player.angle) * 7,
                    vy: Math.sin(this.player.angle) * 7,
                    radius: 4
                };

                this.bullets.push(bullet);
                this.playSound(600, 0.05, 0.1);
            }

            spawnWave() {
                this.asteroids = [];
                const asteroidCount = 3 + this.wave;

                for (let i = 0; i < asteroidCount; i++) {
                    const angle = (Math.PI * 2 * i) / asteroidCount;
                    this.asteroids.push({
                        x: this.canvas.width / 2 + Math.cos(angle) * 200,
                        y: this.canvas.height / 2 + Math.sin(angle) * 200,
                        vx: Math.cos(angle) * (2 + this.wave * 0.5),
                        vy: Math.sin(angle) * (2 + this.wave * 0.5),
                        radius: 20,
                        rotation: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() - 0.5) * 0.1
                    });
                }
            }

            update() {
                if (this.isPaused) return;

                // Update player
                const dx = this.mouseX - this.player.x;
                const dy = this.mouseY - this.player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > this.player.speed) {
                    this.player.x += (dx / distance) * this.player.speed;
                    this.player.y += (dy / distance) * this.player.speed;
                }

                // Keep player in bounds
                this.player.x = Math.max(this.player.width / 2, Math.min(this.canvas.width - this.player.width / 2, this.player.x));
                this.player.y = Math.max(this.player.height / 2, Math.min(this.canvas.height - this.player.height / 2, this.player.y));

                // Update bullets
                this.bullets = this.bullets.filter(bullet => {
                    bullet.x += bullet.vx;
                    bullet.y += bullet.vy;
                    return bullet.x > 0 && bullet.x < this.canvas.width && bullet.y > 0 && bullet.y < this.canvas.height;
                });

                // Update asteroids
                this.asteroids.forEach(asteroid => {
                    asteroid.x += asteroid.vx;
                    asteroid.y += asteroid.vy;
                    asteroid.rotation += asteroid.rotationSpeed;

                    // Wrap around
                    if (asteroid.x < -asteroid.radius) asteroid.x = this.canvas.width + asteroid.radius;
                    if (asteroid.x > this.canvas.width + asteroid.radius) asteroid.x = -asteroid.radius;
                    if (asteroid.y < -asteroid.radius) asteroid.y = this.canvas.height + asteroid.radius;
                    if (asteroid.y > this.canvas.height + asteroid.radius) asteroid.y = -asteroid.radius;
                });

                // Update particles
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    return p.life > 0;
                });

                // Collision detection
                this.bullets.forEach((bullet, bIndex) => {
                    this.asteroids.forEach((asteroid, aIndex) => {
                        const dx = bullet.x - asteroid.x;
                        const dy = bullet.y - asteroid.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < bullet.radius + asteroid.radius) {
                            this.bullets.splice(bIndex, 1);
                            this.asteroids.splice(aIndex, 1);
                            this.score += 10;
                            this.createExplosion(asteroid.x, asteroid.y);
                            this.playSound(800, 0.1, 0.2);
                        }
                    });
                });

                // Player collision with asteroids
                this.asteroids.forEach((asteroid, index) => {
                    const dx = this.player.x - asteroid.x;
                    const dy = this.player.y - asteroid.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < this.player.width / 2 + asteroid.radius) {
                        this.asteroids.splice(index, 1);
                        this.health--;
                        this.createExplosion(this.player.x, this.player.y);
                        this.playSound(200, 0.2, 0.3);
                    }
                });

                // Next wave
                if (this.asteroids.length === 0 && this.health > 0) {
                    this.wave++;
                    this.spawnWave();
                    this.playSound(1000, 0.1, 0.2);
                }
            }

            createExplosion(x, y) {
                for (let i = 0; i < 10; i++) {
                    const angle = (Math.PI * 2 * i) / 10;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * 3,
                        vy: Math.sin(angle) * 3,
                        life: 30,
                        color: `hsl(${Math.random() * 60 + 10}, 100%, 50%)`
                    });
                }
            }

            playSound(frequency, duration, volume) {
                try {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);

                    oscillator.frequency.value = frequency;
                    gainNode.gain.setValueAtTime(volume, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);

                    oscillator.start(this.audioContext.currentTime);
                    oscillator.stop(this.audioContext.currentTime + duration);
                } catch (e) {
                    // Audio not available
                }
            }

            draw() {
                // Clear canvas
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw grid
                this.ctx.strokeStyle = 'rgba(233, 69, 96, 0.1)';
                this.ctx.lineWidth = 1;
                for (let i = 0; i < this.canvas.width; i += 40) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i, 0);
                    this.ctx.lineTo(i, this.canvas.height);
                    this.ctx.stroke();
                }

                // Draw player
                this.ctx.save();
                this.ctx.translate(this.player.x, this.player.y);
                this.ctx.rotate(this.player.angle);
                this.ctx.fillStyle = '#e94560';
                this.ctx.beginPath();
                this.ctx.moveTo(15, 0);
                this.ctx.lineTo(-10, -10);
                this.ctx.lineTo(-5, 0);
                this.ctx.lineTo(-10, 10);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.restore();

                // Draw bullets
                this.ctx.fillStyle = '#e94560';
                this.bullets.forEach(bullet => {
                    this.ctx.beginPath();
                    this.ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                // Draw asteroids
                this.asteroids.forEach(asteroid => {
                    this.ctx.save();
                    this.ctx.translate(asteroid.x, asteroid.y);
                    this.ctx.rotate(asteroid.rotation);
                    this.ctx.strokeStyle = '#e94560';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const angle = (Math.PI * 2 * i) / 8;
                        const radius = asteroid.radius * (0.8 + Math.random() * 0.4);
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) this.ctx.moveTo(x, y);
                        else this.ctx.lineTo(x, y);
                    }
                    this.ctx.closePath();
                    this.ctx.stroke();
                    this.ctx.restore();
                });

                // Draw particles
                this.particles.forEach(p => {
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life / 30;
                    this.ctx.fillRect(p.x, p.y, 2, 2);
                    this.ctx.globalAlpha = 1;
                });

                // Draw UI
                this.ctx.fillStyle = '#e94560';
                this.ctx.font = 'bold 16px Arial';
                this.ctx.fillText(`Wave: ${this.wave}`, 10, 25);
                this.ctx.fillText(`Health: ${this.health}`, 10, 50);

                if (this.health <= 0) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = '#e94560';
                    this.ctx.font = 'bold 32px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('Game Over!', this.canvas.width / 2, this.canvas.height / 2 - 20);
                    this.ctx.font = '18px Arial';
                    this.ctx.fillText(`Final Score: ${this.score}`, this.canvas.width / 2, this.canvas.height / 2 + 20);
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('health').textContent = this.health;
                document.getElementById('wave').textContent = this.wave;
            }

            gameLoop() {
                this.update();
                this.draw();
                this.updateUI();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        const game = new AsteroidBlasterGame();
    </script>
</body>
</html>
